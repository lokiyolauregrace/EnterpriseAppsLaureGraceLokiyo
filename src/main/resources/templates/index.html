<!DOCTYPE html>
<html lang="nl" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Anderlecht Community NGO</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>

<header>
    <h1>Anderlecht Community NGO</h1>
    <p>Samen bouwen aan een sterkere gemeenschap.</p>

    <nav>
        <a href="/">Home</a>
        <a href="/new">Nieuw evenement</a>
        <a href="/about">About</a>
        <a href="/contact">Contact</a>
    </nav>
</header>

<main>

    <h2>Laatste evenementen</h2>

    <p>
        Hieronder vind je een overzicht van de meest recente evenementen.
    </p>

    <table>

        <thead>
        <tr>
            <th>Titel</th>
            <th>Organisatie</th>
            <th>Details</th>
        </tr>
        </thead>

        <tbody>

        <tr th:each="event, stat : ${events}">
            <td th:text="${event.titel}"></td>

            <td th:text="${event.organisatie}"></td>

            <td>
                <a th:href="@{/details/{id}(id=${stat.index})}">
                    Bekijk
                </a>
            </td>
        </tr>

        </tbody>

    </table>

    <br>

    <a href="/new">
        <button>
            Nieuw evenement toevoegen
        </button>
    </a>

</main>

<footer>
    <hr>
    <p>© 2026 Anderlecht Community NGO</p>
</footer>

</body>
</html>
